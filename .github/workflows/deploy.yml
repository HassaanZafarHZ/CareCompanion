name: Care Companion CI/CD Deployment

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub runner par aapka latest code pull karna
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # 2. .NET Core API (Backend) ko build aur publish karna
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build and Publish Backend
      run: |
        # ZAROORI NOTE: Agar aapke backend folder ka naam choti abc mein 'backend' hai, toh neeche 'Backend' ko 'backend' kar dain
        dotnet publish Backend/*.csproj -c Release -o ./backend-dist

    # 3. React (Frontend) ko build karna
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Frontend
      run: |
        # ZAROORI NOTE: Agar aapke frontend folder ka naam choti abc mein 'frontend' hai, toh neeche 'Frontend' ko 'frontend' kar dain
        cd Frontend
        npm install
        npm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=1024"

    # 4. AWS EC2 Server par login karna aur services restart karna
    - name: Deploying to AWS EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo systemctl stop carecompanion-api.service
          sudo systemctl start carecompanion-api.service
          sudo systemctl restart nginx
          echo "Deployment successful! Care Companion is Live."
