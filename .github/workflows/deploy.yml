name: Care Companion CI/CD Deployment

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub runner par aapka latest code pull karna
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # 2. .NET Core API (Backend) ko build aur publish karna
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build and Publish Backend
      run: |
        PROJECT_FILE=$(find . -name "*.csproj" | head -n 1)
        echo "Found project file: $PROJECT_FILE"
        dotnet publish "$PROJECT_FILE" -c Release -o ./backend-dist

    # 3. React (Frontend) ko build karna
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20' # Node version update kar diya taake react-router khush rahe

    - name: Build Frontend
      run: |
        FRONTEND_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
        echo "Found frontend directory: $FRONTEND_DIR"
        cd "$FRONTEND_DIR"
        npm install
        npm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=1024"
        CI: false # JADU: Yeh line warnings ko error banne se rokegi

    # 4. AWS EC2 Server par login karna aur services restart karna
    - name: Deploying to AWS EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo systemctl stop carecompanion-api.service
          sudo systemctl start carecompanion-api.service
          sudo systemctl restart nginx
          echo "Deployment successful! Care Companion is Live."
